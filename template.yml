AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ws-sessions-app

  SAM Template for ws-sessions-app to demonstrate how to keep context for anonymous users
  when they are reconnecting to a WebSocket API. The app shows how to generate a session ID,
  store session context on disconnect, and link different connection IDs from WebSocket
  to a particular user.
  
Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    MemorySize: 128
    Timeout: 15
    LoggingConfig:
      LogFormat: JSON

Parameters:
  ApiStageName:
    Type: String
    Default: Prod
    Description: REQUIRED The name of Websocket API deployment stage
    MinLength: 3
    MaxLength: 10
    AllowedPattern: ^[A-Za-z]+$
    ConstraintDescription: Capital or small letters only.

Resources:
##### Websocket API #####
  Websocket:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-websocket"
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Websocket
      RouteKey: $connect
      AuthorizationType: AWS_IAM
      OperationName: ConnectRoute
      Target: !Join [ '/', ['integrations', !Ref ConnectInteg] ]
  ConnectInteg:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Websocket
      Description: Connect Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnConnectFunction.Arn}/invocations
  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Websocket
      RouteKey: $disconnect
      AuthorizationType: NONE
      OperationName: DisconnectRoute
      Target: !Join [ '/', ['integrations', !Ref DisconnectInteg]]
  DisconnectInteg:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Websocket
      Description: Disconnect Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OnDisconnectFunction.Arn}/invocations
  TeleprinterRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref Websocket
      RouteKey: teleprinter
      AuthorizationType: NONE
      OperationName: TeleprinterRoute
      Target: !Join [ '/', ['integrations', !Ref TeleprinterInteg]]
  TeleprinterInteg:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref Websocket
      Description: Teleprinter Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TeleprinterFunction.Arn}/invocations
  # AutoDeploy makes the stage redeploy automatically whenever any part of
  # the API definition (routes, integrations, authorizers) changes. Without
  # it, a static AWS::ApiGatewayV2::Deployment freezes a snapshot of the
  # API and route edits like flipping $connect from NONE to AWS_IAM do not
  # take effect on the live stage until the deployment is recreated.
  Stage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: !Ref ApiStageName
      Description: Prod Stage
      ApiId: !Ref Websocket
      AutoDeploy: true

##### DynamoDB table for managing Websocket connections #####
  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: "userId"
        AttributeType: "S"
      - AttributeName: "connectionId"
        AttributeType: "S"
      - AttributeName: "active"
        AttributeType: "S"
      - AttributeName: "lastSeen"
        AttributeType: "N"
      KeySchema:
      - AttributeName: "userId"
        KeyType: "HASH"
      GlobalSecondaryIndexes:
      - IndexName: connectionId-index
        Projection:
          ProjectionType: ALL
        KeySchema:
        - KeyType: HASH
          AttributeName: connectionId
      - IndexName: lastSeen-index
        Projection:
          ProjectionType: KEYS_ONLY
        KeySchema:
        - KeyType: HASH
          AttributeName: active
        - KeyType: RANGE
          AttributeName: lastSeen
      SSESpecification:
        SSEEnabled: True

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: "userId"
        AttributeType: "S"
      KeySchema:
      - AttributeName: "userId"
        KeyType: "HASH"
      SSESpecification:
        SSEEnabled: True

##### Cognito Identity Pool for anonymous (guest) clients #####
# Browsers can't set arbitrary headers on a native WebSocket.
# We replace original Sec-WebSocket-Protocol header usage with a Cognito Identity Pool
# that hands out short-lived guest IAM credentials. The frontend SigV4-signs
# the $connect URL with those credentials; API Gateway verifies the signature
# and exposes a stable, server-vouched IdentityId via
# requestContext.identity.cognitoIdentityId. Anonymous UX is preserved - no
# sign-in, no email - but the user id is no longer forgeable.
  IdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub "${AWS::StackName}-guests"
      AllowUnauthenticatedIdentities: true

  UnauthRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
        - Effect: Allow
          Principal:
            Federated: cognito-identity.amazonaws.com
          Action: sts:AssumeRoleWithWebIdentity
          Condition:
            StringEquals:
              "cognito-identity.amazonaws.com:aud": !Ref IdentityPool
            "ForAnyValue:StringLike":
              "cognito-identity.amazonaws.com:amr": unauthenticated
      Policies:
      - PolicyName: WebsocketConnect
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
          # Scope guest creds to invoking $connect on this WS API only. They
          # cannot post to connections, manage stages, or hit any other route.
          - Effect: Allow
            Action: execute-api:Invoke
            Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Websocket}/${ApiStageName}/$connect"

  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref IdentityPool
      Roles:
        unauthenticated: !GetAtt UnauthRole.Arn

##### EventBridge Scheduler #####
  OnDeleteSchedulerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.handler
      CodeUri: handlers/onDelete/
      MemorySize: 128
      Environment:
        Variables:
          CONNECTIONS_TABLE_NAME: !Ref ConnectionsTable
          SESSIONS_TABLE_NAME: !Ref SessionsTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName: !Ref ConnectionsTable
      - DynamoDBCrudPolicy:
          TableName: !Ref SessionsTable
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            Name: !Sub "${AWS::StackName}-onDeleteSchedule"
            ScheduleExpression: rate(5 minutes)

##### Lambda functions #####
  OnConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/onConnect/
      Handler: app.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref ConnectionsTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName: !Ref ConnectionsTable
  OnConnectPermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - Websocket
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnConnectFunction
      Principal: apigateway.amazonaws.com
  OnDisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/onDisconnect/
      Handler: app.handler
      Environment:
        Variables:
          TABLE_NAME: !Ref ConnectionsTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName: !Ref ConnectionsTable
  OnDisconnectPermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - Websocket
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref OnDisconnectFunction
      Principal: apigateway.amazonaws.com
  
  TeleprinterFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handlers/teleprinter
      Handler: app.handler
      Timeout: 600
      Environment:
        Variables:
          API_URL: !Join [ '', [ 'https://', !Ref Websocket, '.execute-api.',!Ref 'AWS::Region','.amazonaws.com/',!Ref 'ApiStageName'] ]
          CONNECTIONS_TABLE_NAME: !Ref ConnectionsTable
          SESSIONS_TABLE_NAME: !Ref SessionsTable
      Policies:
      - DynamoDBCrudPolicy:
          TableName: !Ref ConnectionsTable
      - DynamoDBCrudPolicy:
          TableName: !Ref SessionsTable
      - Statement:
        - Effect: Allow
          Action:
          - 'execute-api:ManageConnections'
          Resource:
          - !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Websocket}/*'
  TeleprinterPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref TeleprinterFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Websocket}/*'
    
Outputs:
  WebSocketURL:
    Description: "The WSS Protocol URL to connect to. Copy and paste to the field on the frontend."
    Value: !Join [ '', [ 'wss://', !Ref Websocket, '.execute-api.',!Ref 'AWS::Region','.amazonaws.com/',!Ref 'ApiStageName'] ]
  IdentityPoolId:
    Description: "Cognito Identity Pool ID. The frontend uses this to obtain guest IAM credentials for SigV4-signing the $connect request."
    Value: !Ref IdentityPool
  AwsRegion:
    Description: "AWS region the stack is deployed to. Required by the frontend to talk to Cognito and to SigV4-sign the WS URL."
    Value: !Ref AWS::Region
